name: Hourly Sync and Release

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  hourly-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Gromets Parser"
          git config user.email "parser@grometsplaza.net"

      - name: Run quick sync and check for new stories
        id: sync
        run: |
          # Run quick sync and capture exit code
          set +e
          python3 quick_sync.py
          exit_code=$?
          set -e
          
          echo "Quick sync completed with exit code: $exit_code"
          
          # Determine status based on exit code
          if [ "$exit_code" = "1" ]; then
            echo "new_stories=true" >> $GITHUB_OUTPUT
            echo "✓ New stories found"
          elif [ "$exit_code" = "0" ]; then
            echo "new_stories=false" >> $GITHUB_OUTPUT
            echo "✓ No new stories"
          else
            echo "new_stories=error" >> $GITHUB_OUTPUT
            echo "✗ Sync error: unexpected exit code: $exit_code"
            exit 1
          fi

      - name: Check if new stories were found
        id: check_stories
        run: |
          new_stories="${{ steps.sync.outputs.new_stories }}"
          echo "New stories status: $new_stories"
          if [ "$new_stories" = "false" ]; then
            echo "No new stories to process - skipping build"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          elif [ "$new_stories" = "true" ]; then
            echo "New stories found - proceeding with build"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          else
            echo "Error determining story status - exiting"
            exit 1
          fi

      - name: Get new story titles for release
        id: stories_info
        if: steps.check_stories.outputs.skip_build != 'true'
        run: |
          # Get the list of new stories from the last commit
          STORY_TITLES=$(git log -1 --pretty=format:"%B" | head -20)
          echo "story_titles=$STORY_TITLES" >> $GITHUB_OUTPUT

      - name: Build website
        if: steps.check_stories.outputs.skip_build != 'true'
        run: |
          cd website
          hugo --minify

      - name: Verify build output
        if: steps.check_stories.outputs.skip_build != 'true'
        run: |
          HTML_COUNT=$(find website/public -name "*.html" | wc -l)
          echo "Built $HTML_COUNT HTML files"
          if [ "$HTML_COUNT" = "0" ]; then
            echo "Error: No HTML files generated"
            exit 1
          fi

      - name: Create archive
        if: steps.check_stories.outputs.skip_build != 'true'
        run: |
          cd website
          tar -czf website-archive.tar.gz public/

      - name: Commit and push changes
        if: steps.check_stories.outputs.skip_build != 'true'
        run: |
          git status --short
          git add -A
          git diff --cached --quiet || git commit -m "Sync: Add new stories from updates"
          git push origin main

      - name: Get new stories info
        if: steps.check_stories.outputs.skip_build != 'true'
        id: stories_info
        run: |
          # Get the commit message which contains story titles
          COMMIT_MSG=$(git log -1 --pretty=format:"%B" | head -10)
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "New stories info captured"

      - name: Create release
        uses: softprops/action-gh-release@v1
        if: steps.check_stories.outputs.skip_build != 'true' && success()
        with:
          tag_name: sync-$(date +'%Y%m%d-%H%M%S')
          name: Website Update $(date +'%Y-%m-%d %H:%M')
          body: |
            Automated hourly sync - New stories added

            **New Stories:**
            ${{ steps.stories_info.outputs.story_titles }}

            ### How to Deploy

            ```bash
            # Download and deploy
            wget https://github.com/${{ github.repository }}/releases/download/sync-$(date +'%Y%m%d-%H%M%S')/website-archive.tar.gz
            tar -xzf website-archive.tar.gz
            cp -r public/* /var/www/gromets/
            ```
          files: website/website-archive.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: steps.check_stories.outputs.skip_build != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/public

      - name: Deploy to GitHub Pages
        if: steps.check_stories.outputs.skip_build != 'true'
        uses: actions/deploy-pages@v4
      
      - name: Notify Matrix
        if: steps.check_stories.outputs.skip_build != 'true'
        env:
          MATRIX_URL: matrix.housetoral.uk
          MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}
          ROOM_ID: ${{ vars.MATRIX_ROOM_ID }}
        run: |
          TXN="m$(date +%s%N)"
          NEW_STORIES=$(cat $GITHUB_OUTPUT | grep "^commit_message=" | cut -d= -f2-)
          
          MESSAGE="🆕 New stories added to Gromet's Plaza Archive!"
          
          curl -X PUT "https://${MATRIX_URL}/_matrix/client/v3/rooms/${ROOM_ID}/send/m.room.message/${TXN}" \
            -H "Authorization: Bearer $MATRIX_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\": \"m.text\", \"body\": \"$MESSAGE\n\n$NEW_STORIES\"}"

      - name: No new stories - success
        if: steps.check_stories.outputs.skip_build == 'true'
        run: |
          echo "✓ No new stories found - workflow completed successfully (skipped)"